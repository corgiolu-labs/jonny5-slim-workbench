CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_CONSOLE=y

CONFIG_LOG=y
# Deferred mode: log calls return instantly, flushed by idle thread.
# All printk on RT path converted to LOG_* so they never block the 1kHz loop.
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_LOG_PROCESS_TRIGGER_THRESHOLD=10
CONFIG_LOG_DEFAULT_LEVEL=0
CONFIG_CBPRINTF_FP_SUPPORT=y

# Main thread: runs uart_control_process() which dispatches every UART cmd
# including VR? (char msg[320] + snprintf 40+ varargs + CBPRINTF_FP_SUPPORT)
# and SET_VR_PARAMS. Slim had been reduced to 1536 which left < 100 B headroom
# and caused intermittent overflow + silent memory corruption → k_fatal_halt
# after some minutes (field: IMU sample_counter frozen, UART STATUS? timeout).
# Restored to baseline 2048.
CONFIG_MAIN_STACK_SIZE=2048
# RT loop thread stack (created explicitly in rt_loop.c with 4096)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=5

CONFIG_CLOCK_CONTROL=y
CONFIG_GPIO=y
CONFIG_WATCHDOG=n

CONFIG_MULTITHREADING=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_ASSERT=y
# Stack overflow detection: promote silent memory corruption to clean fatal
# log on USART2 console (kernel prints the offending thread and halts).
# Required safety net — without it, any future thread stack overflow
# corrupts adjacent kernel state and causes unpredictable failures minutes
# later (as observed in field with the reduced main stack).
CONFIG_STACK_SENTINEL=y
CONFIG_THREAD_STACK_INFO=y

# Driver SPI Zephyr OFF (usiamo HAL)
CONFIG_SPI=n

# SPI protocol: 128B canonical-compatible (64B semantico + 64B riservato)
CONFIG_ASSIST_V2_RAW_MODE=n
CONFIG_J5_CANONICAL_PADDED_128_MODE=y
CONFIG_TARGET_SPI_IDENTITY_MARKER=n

# PWM servo: TIM8 (50 Hz) + TIM1 (50 Hz)
CONFIG_PWM=y
CONFIG_PWM_STM32=y

# I2C per IMU MPU6050 (interrupt-driven obbligatorio)
CONFIG_I2C=y
CONFIG_I2C_STM32_INTERRUPT=y
CONFIG_SENSOR=y
CONFIG_MPU6050=y
